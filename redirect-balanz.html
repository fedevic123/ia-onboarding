<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abriendo tu cuenta en Balanz — Inversiones Andinas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #073AAB;
    --blue-dark:   #05297A;
    --blue-bright: #2465F6;
    --green:       #21E2AB;
    --green-mid:   #18B488;
    --f-title: 'Poppins', sans-serif;
    --f-body:  'Roboto', sans-serif;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%; font-family: var(--f-body);
    background: linear-gradient(160deg, #05297A 0%, #073AAB 55%, #1a4fc2 100%);
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  .bg-rings { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.06);
    animation: pulse 4s ease-in-out infinite;
  }
  .ring:nth-child(1) { width:300px;height:300px;top:-80px;right:-80px;animation-delay:0s; }
  .ring:nth-child(2) { width:500px;height:500px;top:-180px;right:-180px;animation-delay:.8s; }
  .ring:nth-child(3) { width:200px;height:200px;bottom:-60px;left:-60px;animation-delay:1.6s; }
  @keyframes pulse { 0%,100%{opacity:.4}50%{opacity:.9} }
  .glow {
    position:fixed;
    background:radial-gradient(circle,rgba(33,226,171,.1) 0%,transparent 65%);
    width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);
    pointer-events:none;z-index:0;
  }
  .logo-wrap {
    position:fixed;top:20px;left:20px;
    display:flex;align-items:center;gap:10px;opacity:.85;z-index:10;
  }
  .logo-sep { width:1px;height:18px;background:rgba(255,255,255,.3); }
  .logo-broker { font-family:var(--f-title);font-size:13px;font-weight:700;color:rgba(255,255,255,.8); }
  .container {
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:32px 24px;text-align:center;
  }
  .check-ring {
    width:96px;height:96px;border-radius:50%;
    border:2px solid rgba(33,226,171,.4);background:rgba(33,226,171,.1);
    display:flex;align-items:center;justify-content:center;margin-bottom:28px;
    animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
  }
  @keyframes popIn { from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1} }
  .check-svg { width:44px;height:44px; }
  .check-path {
    stroke:#21E2AB;stroke-width:3;fill:none;
    stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:70;stroke-dashoffset:70;
    animation:draw .45s ease .5s forwards;
  }
  @keyframes draw { to{stroke-dashoffset:0} }
  .title {
    font-family:var(--f-title);font-weight:700;font-size:26px;
    color:#fff;letter-spacing:-.02em;margin-bottom:10px;
    animation:fadeUp .4s ease .3s both;
  }
  .subtitle {
    font-size:14px;color:rgba(255,255,255,.65);line-height:1.65;
    max-width:280px;margin-bottom:36px;
    animation:fadeUp .4s ease .4s both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
  .pills {
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    margin-bottom:44px;animation:fadeUp .4s ease .45s both;
  }
  .pill {
    display:flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
    border-radius:50px;padding:6px 14px;
    font-size:12px;font-weight:500;color:#fff;
    font-family:var(--f-title);backdrop-filter:blur(8px);
  }
  .pill-dot { width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0; }
  .progress-wrap { width:100%;max-width:300px;animation:fadeUp .4s ease .5s both; }
  .progress-top { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px; }
  .progress-label {
    font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(255,255,255,.45);font-family:var(--f-title);
  }
  .progress-secs { font-size:15px;font-weight:700;color:var(--green);font-family:var(--f-title); }
  .bar-track { height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden; }
  .bar-fill {
    height:100%;width:100%;
    background:linear-gradient(90deg,var(--green-mid),var(--green));
    border-radius:4px;transition:width linear;
  }
  .spinner-wrap { display:none;flex-direction:column;align-items:center;gap:12px;margin-top:28px; }
  .spinner-wrap.show { display:flex;animation:fadeUp .3s ease both; }
  .spinner {
    width:36px;height:36px;border-radius:50%;
    border:3px solid rgba(255,255,255,.12);border-top-color:var(--green);
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner-txt { font-size:11px;color:rgba(255,255,255,.4);font-family:var(--f-title);letter-spacing:.08em;text-transform:uppercase; }
  .security-note {
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    font-size:10px;color:rgba(255,255,255,.3);
    display:flex;align-items:center;gap:5px;white-space:nowrap;
    font-family:var(--f-title);animation:fadeUp .4s ease .7s both;
  }
</style>
</head>
<body>
<div class="bg-rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
<div class="glow"></div>

<div class="logo-wrap">
  <svg height="22" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="11" height="30" rx="5.5" fill="rgba(255,255,255,.9)" transform="rotate(-45 15 15) translate(-2,-3)"/>
    <rect x="0" y="0" width="11" height="30" rx="5.5" fill="rgba(255,255,255,.6)" transform="rotate(-45 15 15) translate(10,-3)"/>
    <rect x="0" y="0" width="7"  height="18" rx="3.5" fill="#21E2AB" transform="rotate(-45 15 15) translate(17,9)"/>
    <text x="52" y="16" font-family="Poppins,sans-serif" font-weight="700" font-size="10.5" fill="rgba(255,255,255,.9)" letter-spacing="0.5">INVERSIONES</text>
    <text x="52" y="30" font-family="Poppins,sans-serif" font-weight="700" font-size="10.5" fill="rgba(255,255,255,.9)" letter-spacing="0.5">ANDINAS</text>
  </svg>
  <div class="logo-sep"></div>
  <div class="logo-broker">× Balanz</div>
</div>

<div class="container">
  <div class="check-ring">
    <svg class="check-svg" viewBox="0 0 44 44">
      <polyline class="check-path" points="9,23 19,33 36,14"/>
    </svg>
  </div>
  <h1 class="title">¡Todo listo!</h1>
  <p class="subtitle">Tus datos ya están cargados en el formulario de Balanz. Solo tenés que confirmar.</p>
  <div class="pills" id="pills"></div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">Abriendo Balanz</span>
      <span class="progress-secs" id="secs">5</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  </div>
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    <div class="spinner-txt">Cargando formulario…</div>
  </div>
</div>

<div class="security-note">🔒 Tus datos viajan de forma segura</div>

<script>
  const p        = new URLSearchParams(location.search);
  const nombre   = p.get('nombre')   || '';
  const apellido = p.get('apellido') || '';
  const email    = p.get('email')    || '';
  const tel      = p.get('tel')      || '';

  // Pills
  const pillsEl = document.getElementById('pills');
  [[`${nombre} ${apellido}`.trim(), nombre||apellido], [email, email]]
    .filter(([,s]) => s)
    .forEach(([label]) => {
      const d = document.createElement('div');
      d.className = 'pill';
      d.innerHTML = `<div class="pill-dot"></div>${label}`;
      pillsEl.appendChild(d);
    });

  // URL de Balanz con datos en el hash (accesible por JS en balanz.com, no viaja al servidor)
  const hashPayload = encodeURIComponent([nombre, apellido, email].join('|'));
  const BALANZ_URL =
    'https://www.balanz.com/abrir-cuenta-2.aspx' +
    '?reference=contacto@inversionesandinas.com' +
    '#ia=' + hashPayload;

  // Countdown
  const SECS = 5;
  let rem = SECS;
  const secsEl = document.getElementById('secs');
  const barEl  = document.getElementById('bar');
  const spinEl = document.getElementById('spinner');

  barEl.style.transition = `width ${SECS}s linear`;
  requestAnimationFrame(() => { barEl.style.width = '0%'; });

  const t = setInterval(() => {
    rem--;
    secsEl.textContent = rem;
    if (rem <= 0) {
      clearInterval(t);
      secsEl.textContent = '0';
      spinEl.classList.add('show');
      setTimeout(() => { window.location.href = BALANZ_URL; }, 500);
    }
  }, 1000);
</script>
</body>
</html>
